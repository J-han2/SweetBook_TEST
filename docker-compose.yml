services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/data/dreamarchive.db}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      LLM_MODEL_PATH: /app/models/qwen2.5-0.5b-instruct-q4_k_m.gguf
      LLM_CHAT_FORMAT: ${LLM_CHAT_FORMAT:-chatml}
      LLM_N_CTX: ${LLM_N_CTX:-2048}
    volumes:
      - ./apps/api/data:/app/data
      - ./apps/api/storage:/app/storage
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    depends_on:
      api:
        condition: service_healthy
    command: >
      sh -c "until wget -qO- http://api:8000/health >/dev/null; do
      echo 'waiting for api';
      sleep 2;
      done &&
      HOSTNAME=0.0.0.0 PORT=3000 node .next/standalone/server.js"
    ports:
      - "${WEB_PORT:-3000}:3000"
