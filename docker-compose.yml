services:
  api:
    image: ${API_IMAGE:-ghcr.io/j-han2/sweetbook-test-api:${IMAGE_TAG:-latest}}
    pull_policy: always
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/data/dreamarchive.db}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      LLM_MODEL_PATH: /app/models/qwen2.5-0.5b-instruct-q4_k_m.gguf
      LLM_CHAT_FORMAT: ${LLM_CHAT_FORMAT:-chatml}
      LLM_N_CTX: ${LLM_N_CTX:-2048}
    volumes:
      - api_data:/app/data
      - api_runtime_uploads:/app/storage/uploads/runtime
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"

  web:
    image: ${WEB_IMAGE:-ghcr.io/j-han2/sweetbook-test-web:${IMAGE_TAG:-latest}}
    pull_policy: always
    restart: unless-stopped
    environment:
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://api:8000}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

volumes:
  api_data:
  api_runtime_uploads:
