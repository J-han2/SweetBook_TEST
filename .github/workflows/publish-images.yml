name: Publish Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image owner
        id: owner
        shell: bash
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/sweetbook-test-api:latest
            ghcr.io/${{ steps.owner.outputs.value }}/sweetbook-test-api:${{ github.sha }}

      - name: Build and push WEB image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          file: apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/sweetbook-test-web:latest
            ghcr.io/${{ steps.owner.outputs.value }}/sweetbook-test-web:${{ github.sha }}
